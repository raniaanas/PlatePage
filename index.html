<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuwait  Finder</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a3c6e, #2d6a4f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 36px 28px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .app-title {
            font-size: 20px;
            font-weight: 700;
            color: #1a3c6e;
            margin-bottom: 20px;
        }

        .parcel-label {
            color: #888;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .parcel-number {
            font-size: 26px;
            font-weight: 700;
            color: #1a3c6e;
            margin-bottom: 24px;
            letter-spacing: 2px;
            background: #f0f4ff;
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
        }
        /* ── Input (shown when no parcel in URL) ── */
        .input-section {
            margin-bottom: 20px;
        }

            .input-section input {
                width: 100%;
                padding: 14px 16px;
                font-size: 18px;
                border: 2px solid #d0d7ff;
                border-radius: 12px;
                text-align: center;
                letter-spacing: 2px;
                outline: none;
                transition: border-color 0.2s;
            }

                .input-section input:focus {
                    border-color: #1a73e8;
                }

            .input-section button {
                margin-top: 10px;
                width: 100%;
                padding: 14px;
                background: #1a3c6e;
                color: white;
                border: none;
                border-radius: 12px;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                transition: opacity 0.2s;
            }

                .input-section button:hover {
                    opacity: 0.88;
                }
        /* ── Link buttons ── */
        .btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            border-radius: 14px;
            margin-bottom: 14px;
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
            color: white;
            transition: transform 0.15s, opacity 0.15s;
            cursor: pointer;
        }

            .btn:hover {
                transform: translateY(-2px);
                opacity: 0.9;
            }

            .btn:active {
                transform: translateY(0);
                opacity: 0.8;
            }

            .btn .icon {
                font-size: 22px;
                min-width: 30px;
                text-align: center;
            }

            .btn .label {
                flex: 1;
                text-align: left;
            }

            .btn .arrow {
                font-size: 16px;
                opacity: 0.6;
            }

            .btn.kuwait {
                background: linear-gradient(135deg, #1a73e8, #1558b0);
            }

            .btn.paci {
                background: linear-gradient(135deg, #2d6a4f, #1e4d38);
            }

            .btn.moi {
                background: linear-gradient(135deg, #b5451b, #8c3414);
            }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 4px 0 18px;
            color: #ccc;
            font-size: 12px;
        }

            .divider::before, .divider::after {
                content: '';
                flex: 1;
                height: 1px;
                background: #eee;
            }

        .warn {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 10px;
            padding: 12px 16px;
            color: #856404;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .footer {
            margin-top: 24px;
            color: #ccc;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">📦</div>
        <div class="app-title">Kuwait Finder</div>

        <!-- Shown when NO parcel in URL -->
        <div class="input-section" id="input-section" style="display:none;">
            <div class="parcel-label">Enter your parcel number</div>
            <input type="text" id="parcel-input" placeholder="e.g. 12345"
                   maxlength="20" inputmode="numeric" />
            <button onclick="submitParcel()">Open Links →</button>
        </div>

        <!-- Shown when parcel is known -->
        <div id="main-section" style="display:none;">
            <div class="parcel-label">Parcel Number</div>
            <div class="parcel-number" id="parcel-display">—</div>
            <div id="token-warning"></div>
            <div id="links"></div>
        </div>

        <div class="footer">Kuwait Finder &copy; 2025</div>
    </div>

    <script>
        // ── Fixed Tokens ──────────────────────────────────────────────
        const TOKENS = {
            'PACI123': ['PACI'],
            'MOI456': ['MOI'],
            'FULL789': ['PACI', 'MOI']
        };

        // ── Link Definitions ──────────────────────────────────────────
        const LINK_MAP = {
            'KuwaitFinder': {
                title: 'Kuwait Finder',
                icon: '📍',
                cls: 'kuwait',
                url: (parcel) => `kuwaitfinder://?text=${encodeURIComponent(parcel)}`
            },
            'PACI': {
                title: 'PACI Inquiry',
                icon: '🏛️',
                cls: 'paci',
                url: (parcel) => `https://services.paci.gov.kw/card/inquiry?lang=en&serviceType=2&parcel=${encodeURIComponent(parcel)}`
            },
            'MOI': {
                title: 'MOI',
                icon: '🛡️',
                cls: 'moi',
                url: (parcel) => `https://www.moi.gov.kw/main?culture=en&parcel=${encodeURIComponent(parcel)}`
            }
        };

        // ── Read URL Params ───────────────────────────────────────────
        const params = new URLSearchParams(window.location.search);
        const parcel = params.get('parcel') || '';
        const token = params.get('token') || '';

        // ── Decide which section to show on load ──────────────────────
        if (parcel) {
            showLinks(parcel);
        } else {
            document.getElementById('input-section').style.display = 'block';
            // Auto-focus input on mobile
            document.getElementById('parcel-input').focus();
        }

        // ── User typed parcel and pressed button ──────────────────────
        function submitParcel() {
            const val = document.getElementById('parcel-input').value.trim();
            if (!val) {
                document.getElementById('parcel-input').style.borderColor = '#e53935';
                return;
            }
            document.getElementById('input-section').style.display = 'none';
            showLinks(val);
        }

        // Allow pressing Enter in the input field
        document.getElementById('parcel-input').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') submitParcel();
        });

        // ── Render links for a given parcel ──────────────────────────
        function showLinks(parcelValue) {
            document.getElementById('parcel-display').textContent = parcelValue;
            document.getElementById('main-section').style.display = 'block';

            // Resolve token → links
            let toShow = ['KuwaitFinder'];
            let tokenValid = false;

            if (token) {
                if (TOKENS[token]) {
                    tokenValid = true;
                    toShow = toShow.concat(TOKENS[token]);
                }
                // Invalid token warning
                if (!tokenValid) {
                    document.getElementById('token-warning').innerHTML =
                        `<div class="warn">⚠️ Invalid token. Showing default access only.</div>`;
                }
            }

            if (toShow.length > 1) {
                document.getElementById('links').innerHTML =
                    `<div class="divider">open with</div>`;
            }

            toShow.forEach(key => {
                const def = LINK_MAP[key];
                if (!def) return;
                const a = document.createElement('a');
                a.href = def.url(parcelValue);
                a.className = `btn ${def.cls}`;
                a.innerHTML = `
                    <span class="icon">${def.icon}</span>
                    <span class="label">${def.title}</span>
                    <span class="arrow">›</span>`;
                if (key === 'KuwaitFinder') {
                    a.addEventListener('click', function (e) {
                        e.preventDefault();
                        window.location.href = def.url(parcelValue);
                    });
                }
                document.getElementById('links').appendChild(a);
            });
        }
    </script>
</body>
</html>
